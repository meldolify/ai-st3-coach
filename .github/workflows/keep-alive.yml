name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 0 * * 0,5'  # Every Sunday and Friday at midnight UTC
  workflow_dispatch:        # Manual trigger for testing

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Query Supabase database to prevent free tier pause
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "Supabase ping: HTTP $HTTP_STATUS at $(date -u)"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "OK - Database query successful"
          else
            echo "::error::Supabase ping failed (HTTP $HTTP_STATUS)"
            exit 1
          fi

name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 0 * * *'  # Every day at midnight UTC
  workflow_dispatch:        # Manual trigger for testing

# This workflow only calls Supabase via HTTPS — no repo access needed at all,
# but `contents: read` is the minimum-viable default for actions/checkout.
permissions:
  contents: read

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Write to Supabase database to prevent free tier pause
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive?id=eq.1" \
            -X PUT \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"id": 1, "pinged_at": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}')

          echo "Supabase keep-alive: HTTP $HTTP_STATUS at $(date -u)"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "OK - Database write successful"
          else
            echo "::error::Supabase keep-alive failed (HTTP $HTTP_STATUS)"
            exit 1
          fi
